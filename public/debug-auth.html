<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Authentication</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        h1 {
            color: #00ffff;
            border-bottom: 2px solid #00ffff;
            padding-bottom: 10px;
        }
        .section {
            background: #0a0a0a;
            padding: 15px;
            margin: 20px 0;
            border-left: 4px solid #00ff00;
            border-radius: 4px;
        }
        .key {
            color: #ffff00;
            font-weight: bold;
        }
        .value {
            color: #00ff00;
            word-break: break-all;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }
        button:hover {
            background: #00ffff;
        }
        .error {
            color: #ff0000;
            border-color: #ff0000;
        }
        .success {
            color: #00ff00;
            border-color: #00ff00;
        }
        pre {
            background: #000;
            padding: 10px;
            overflow-x: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🔍 Authentication Debug Tool</h1>

    <div class="section">
        <h2>📦 LocalStorage Contents</h2>
        <div id="localStorage-content"></div>
    </div>

    <div class="section">
        <h2>🍪 Cookies</h2>
        <div id="cookies-content"></div>
    </div>

    <div class="section">
        <h2>🧪 Test API Calls</h2>
        <button onclick="testGetTasks()">Test GET /api/tasks</button>
        <button onclick="testCreateTask()">Test POST /api/tasks</button>
        <div id="api-results" style="margin-top: 15px;"></div>
    </div>

    <div class="section">
        <h2>🛠️ Actions</h2>
        <button onclick="refreshData()">Refresh Data</button>
        <button onclick="clearAuth()">Clear All Auth Data</button>
        <button onclick="location.href='/login'">Go to Login</button>
    </div>

    <script>
        function displayLocalStorage() {
            const container = document.getElementById('localStorage-content');
            const keys = ['token', 'user', 'authToken'];
            let html = '';

            keys.forEach(key => {
                const value = localStorage.getItem(key);
                if (value) {
                    html += `<p><span class="key">${key}:</span> <span class="value">${value.substring(0, 100)}${value.length > 100 ? '...' : ''}</span></p>`;
                } else {
                    html += `<p><span class="key">${key}:</span> <span class="error">NOT FOUND</span></p>`;
                }
            });

            container.innerHTML = html || '<p class="error">No auth data found</p>';
        }

        function displayCookies() {
            const container = document.getElementById('cookies-content');
            const cookies = document.cookie.split(';').map(c => c.trim());

            if (cookies.length > 0 && cookies[0]) {
                container.innerHTML = cookies.map(c => `<p class="value">${c}</p>`).join('');
            } else {
                container.innerHTML = '<p class="error">No cookies found</p>';
            }
        }

        async function testGetTasks() {
            const results = document.getElementById('api-results');
            results.innerHTML = '<p>🔄 Testing GET request...</p>';

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/tasks', {
                    method: 'GET',
                    headers: {
                        'Authorization': token ? `Bearer ${token}` : '',
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                results.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'} section">
                        <p><span class="key">GET /api/tasks</span></p>
                        <p><span class="key">Status:</span> ${response.status} ${response.statusText}</p>
                        <p><span class="key">Response:</span></p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                results.innerHTML = `<div class="error section"><p>❌ Error: ${error.message}</p></div>`;
            }
        }

        async function testCreateTask() {
            const results = document.getElementById('api-results');
            results.innerHTML = '<p>🔄 Testing POST request...</p>';

            try {
                const token = localStorage.getItem('token');

                if (!token) {
                    results.innerHTML = '<div class="error section"><p>❌ No token found in localStorage!</p></div>';
                    return;
                }

                const testTask = {
                    name: 'DEBUG TEST TASK - Please ignore and delete',
                    client: 'Debug Client',
                    clientEmail: 'debug@test.com',
                    assignedTo: 'Test User',
                    assigneeEmail: 'test@test.com',
                    vertex: 'CMIS',
                    typeOfWork: 'Development',
                    category: 'Testing',
                    startDate: new Date().toISOString().split('T')[0],
                    endDate: new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0],
                    workingHours: 8,
                    estimatedCost: 680,
                    priority: 'Medium'
                };

                console.log('🔑 Token:', token.substring(0, 20) + '...');
                console.log('📤 Sending request with headers:', {
                    'Authorization': `Bearer ${token.substring(0, 20)}...`,
                    'Content-Type': 'application/json'
                });

                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testTask)
                });

                const data = await response.json();

                results.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'} section">
                        <p><span class="key">POST /api/tasks</span></p>
                        <p><span class="key">Status:</span> ${response.status} ${response.statusText}</p>
                        <p><span class="key">Token Sent:</span> ${token.substring(0, 30)}...</p>
                        <p><span class="key">Response:</span></p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                results.innerHTML = `<div class="error section"><p>❌ Error: ${error.message}</p></div>`;
            }
        }

        function clearAuth() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('authToken');
            sessionStorage.clear();
            alert('✅ All auth data cleared!');
            refreshData();
        }

        function refreshData() {
            displayLocalStorage();
            displayCookies();
            document.getElementById('api-results').innerHTML = '';
        }

        // Initialize
        refreshData();
    </script>
</body>
</html>
